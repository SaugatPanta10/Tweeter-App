{% extends 'base.html' %}

{% block content %}
    <h2> Delete Tweet</h2>
    
    <p>Are you absolutely sure you want to permanently delete this tweet?</p>
    
    <blockquote style="border-left: 3px solid red; padding-left: 10px; color: #555;">
        "{{ tweet.content }}"
    </blockquote>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="color: red; font-weight: bold;">⚠️ Yes, Delete Permanently</button>
    </form>
    
    <p><a href="/">No, take me back to safety</a></p>
{% endblock %}
